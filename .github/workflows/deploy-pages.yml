name: Deploy to GitHub Pages

# main'e her push'ta otomatik tetiklenir; manuel "Run workflow" de mümkün
on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages deploy için gereken izinler
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek deployment çalışsın; biri biterken yenisi başlamasın
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Debug — repo Variables injection check
        run: |
          echo "=== Repo Variables (set/empty kontrolü, değer maskeli) ==="
          echo "VITE_AZURE_CLIENT_ID: ${{ vars.VITE_AZURE_CLIENT_ID != '' && 'SET' || 'EMPTY' }}"
          echo "VITE_AZURE_TENANT_ID: ${{ vars.VITE_AZURE_TENANT_ID != '' && 'SET' || 'EMPTY' }}"
          echo "VITE_DATAVERSE_URL:   ${{ vars.VITE_DATAVERSE_URL != '' && 'SET' || 'EMPTY' }}"
          echo "İlk 8 karakter (debug — public client ID zaten gizli değil):"
          echo "CLIENT_ID prefix:  ${VITE_AZURE_CLIENT_ID:0:8}"
          echo "TENANT_ID prefix:  ${VITE_AZURE_TENANT_ID:0:8}"
          echo "DV URL prefix:     ${VITE_DATAVERSE_URL:0:20}"
        env:
          VITE_AZURE_CLIENT_ID: ${{ vars.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ vars.VITE_AZURE_TENANT_ID }}
          VITE_DATAVERSE_URL: ${{ vars.VITE_DATAVERSE_URL }}

      - name: Build (Vite + SPA 404 fallback)
        run: npm run build:pages
        env:
          # Azure + ana Dataverse URL → repo Variables'tan (sensitive değil ama
          # tenant-spesifik değerler, env'lere göre değişebilir).
          VITE_AZURE_CLIENT_ID: ${{ vars.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ vars.VITE_AZURE_TENANT_ID }}
          VITE_DATAVERSE_URL: ${{ vars.VITE_DATAVERSE_URL }}
          # Entity adları + historical URL → workflow'da hardcoded (config-only,
          # secret değil; zaten README ve bundle'da görünür).
          VITE_DATAVERSE_ENTITY: mserp_tryaiinventoryagingreportentities
          VITE_HISTORICAL_DATAVERSE_URL: https://operations-tiryaki.crm4.dynamics.com
          VITE_HISTORICAL_SALES_ENTITY: mserp_tryhistoricalsalesdemandentities

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
